name: Publish to npm

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'package.json' # Trigger when package.json is updated by the versioning PR

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Only run if the PR was merged (not just closed) and the head branch is main
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup Node.js 21.x
        uses: actions/setup-node@v5
        with:
          node-version: 21

      - name: Install Dependencies
        run: npm install

      - name: Build Production package
        run: npm run deploy

      - name: Get package info
        id: package_info
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: Get latest npm version
        id: npm_version
        run: |
          NPM_LATEST_VERSION=$(npm view ${{ env.PACKAGE_NAME }} version || echo "0.0.0")
          echo "NPM_LATEST_VERSION=$NPM_LATEST_VERSION" >> $GITHUB_ENV
        continue-on-error: true

      - name: Publish to npm
        if: env.PACKAGE_VERSION > env.NPM_LATEST_VERSION
        uses: changesets/action@v1
        with:
          publish: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
