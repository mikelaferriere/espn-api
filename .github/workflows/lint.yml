name: Lint

on:
  pull_request:

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Make sure the actual branch is checked out when running on pull requests
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - uses: sibiraj-s/action-eslint@v4
        with:
          annotations: true
